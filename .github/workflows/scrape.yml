name: Lead Generation Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Business Niche (e.g., Dentist)'
        required: true
        default: 'Dentist'
      location:
        description: 'Location (e.g., California)'
        required: true
        default: 'California'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NICHE: ${{ github.event.inputs.niche }}
          LOCATION: ${{ github.event.inputs.location }}
          PORT: 3001
        run: xvfb-run --auto-servernum -- node index.js
