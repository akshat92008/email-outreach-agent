name: AI Lead Generation Engine

on:
  schedule:
    # Run automatically every day at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Business Niche (e.g., Dentist)'
        required: false
      location:
        description: 'Location (e.g., California)'
        required: false

jobs:
  scrape_and_outreach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: Determine Daily Target
        id: target
        run: |
          # Define high-value targets for autonomous rotation
          NICHES=("Dentist" "Lawyer" "Roofing Contractor" "HVAC" "Plumber" "Real Estate Agency" "Med Spa")
          CITIES=("Austin, TX" "Miami, FL" "Denver, CO" "Seattle, WA" "Atlanta, GA" "Phoenix, AZ" "Chicago, IL")
          
          # If manual input provided, use it. Otherwise, calculate daily rotation.
          if [ "${{ github.event.inputs.niche }}" != "" ]; then
            SELECTED_NICHE="${{ github.event.inputs.niche }}"
            SELECTED_CITY="${{ github.event.inputs.location }}"
          else
            # Get the day of the year (1-365)
            DAY_OF_YEAR=$(date +%j)
            
            # Use modulo math to rotate through combinations
            NICHE_INDEX=$(( 10#${DAY_OF_YEAR} % ${#NICHES[@]} ))
            CITY_INDEX=$(( (10#${DAY_OF_YEAR} / ${#NICHES[@]}) % ${#CITIES[@]} ))
            
            SELECTED_NICHE="${NICHES[$NICHE_INDEX]}"
            SELECTED_CITY="${CITIES[$CITY_INDEX]}"
          fi
          
          echo "SELECTED_NICHE=$SELECTED_NICHE" >> $GITHUB_ENV
          echo "SELECTED_CITY=$SELECTED_CITY" >> $GITHUB_ENV
          echo "🎯 Targeting today: $SELECTED_NICHE in $SELECTED_CITY"

      - name: Execute Autonomous Agent
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NICHE: ${{ env.SELECTED_NICHE }}
          LOCATION: ${{ env.SELECTED_CITY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: xvfb-run --auto-servernum -- node index.js
